<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris Diaries | بورتفوليو احترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --paper-white: #f4f4f2; /* لون ورق قديم قليلاً */
            --ink-black: #1a1a1a;
            --soft-gray: #e0e0e0;
            --accent: #666;
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- دستور الاستجابة الصارم --- */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            background-color: var(--paper-white);
            color: var(--ink-black);
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* منع التمرير العرضي */
            position: relative;
        }

        /* تأثير ملمس الورق (Grain Texture) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.2;
            pointer-events: none;
            z-index: 9999;
        }

        .container {
            width: min(92%, 1100px);
            margin-inline: auto;
            padding-bottom: 100px;
        }

        /* --- Header & Hero --- */
        .hero-header {
            position: relative;
            margin-top: 40px;
            margin-bottom: 120px;
        }

        .cover-image-wrapper {
            width: 100%;
            height: clamp(250px, 40vh, 500px);
            overflow: hidden;
            border: 1px solid var(--soft-gray);
        }

        .cover-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.2) contrast(1.1);
        }

        .profile-wrapper {
            position: absolute;
            bottom: -60px;
            left: 5%;
            display: flex;
            align-items: flex-end;
            gap: 20px;
            z-index: 10;
        }

        .avatar {
            width: clamp(120px, 20vw, 220px);
            height: clamp(120px, 20vw, 220px);
            border-radius: 50%;
            border: 10px solid var(--paper-white);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Bio & Info --- */
        .bio-section {
            margin-top: 80px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bio-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .bio-section .handle {
            color: var(--accent);
            font-weight: 600;
        }

        .bio-section .details {
            font-size: 0.8rem;
            line-height: 1.8;
            max-width: 400px;
            margin-top: 10px;
            color: #555;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 60px;
            border-bottom: 1px solid var(--soft-gray);
            padding-bottom: 15px;
        }

        .section-title h2 {
            font-size: 2.2rem;
            font-weight: 700;
        }

        /* --- Navigation Tabs --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
            list-style: none;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
        }

        .tabs li {
            cursor: pointer;
            position: relative;
            padding-bottom: 5px;
        }

        .tabs li.active {
            color: var(--ink-black);
            border-bottom: 2px solid var(--ink-black);
        }

        /* --- Gallery Grid --- */
        .gallery-grid {
            display: grid;
            /* استجابة تلقائية: 4 أعمدة في الشاشات الكبيرة وعمودان في الجوال */
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 240px), 1fr));
            gap: 15px;
        }

        .gallery-item {
            aspect-ratio: 1;
            overflow: hidden;
            border: 1px solid var(--soft-gray);
            background: #fff;
            padding: 10px;
            transition: var(--transition);
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.1);
        }

        /* --- Footer --- */
        footer {
            margin-top: 100px;
            padding: 40px 0;
            border-top: 1px solid var(--soft-gray);
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* --- Animations --- */
        .reveal { opacity: 0; transform: translateY(30px); }

        @media (max-width: 600px) {
            .profile-wrapper { left: 50%; transform: translateX(-50%); bottom: -80px; }
            .bio-section { text-align: center; margin-top: 100px; align-items: center; }
            .section-title { flex-direction: column; gap: 10px; text-align: center; }
            .tabs { gap: 20px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero-header">
            <div class="cover-image-wrapper">
                <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=2000" alt="Paris Skyline" class="parallax-img">
            </div>
            <div class="profile-wrapper reveal">
                <div class="avatar">
                    <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=600" alt="Profile">
                </div>
            </div>
        </header>

        <section class="bio-section reveal">
            <h1>Taehyung</h1>
            <span class="handle">@thv</span>
            <div class="details">
                he/him (1995) <br>
                born on December 30 <br>
                "I love you more than yesterday but less than tomorrow.."
            </div>
        </section>

        <div class="section-title reveal">
            <h2>Paris Diaries</h2>
            <span style="font-weight: 600; color: var(--accent);">( 27.06.2022 )</span>
        </div>

        <ul class="tabs reveal">
            <li class="active">Photos</li>
            <li>Album</li>
            <li>Videos</li>
        </ul>

        <main class="gallery-grid">
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1550346150-d13f7149bc2c?w=600"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1493329008958-39dec3d0700d?w=600"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1549492423-400259a2e574?w=600"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1503917988258-f1978d442e67?w=600"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1492666673288-3c4b4576ad9a?w=600"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1509439581779-629c5b274e8b?w=600"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1522093007474-d86e9bf7ba6f?w=600"></div>
            <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=600"></div>
        </main>

        <footer>
            <div>Paris ( France )</div>
            <div style="letter-spacing: 3px;">PURPLEWITHTAE</div>
        </footer>
    </div>

    <script>
        // تفعيل GSAP
        gsap.registerPlugin(ScrollTrigger);

        // 1. تحريك الـ Reveal للعناصر عند السكرول
        const reveals = document.querySelectorAll('.reveal');
        reveals.forEach((el, index) => {
            gsap.to(el, {
                scrollTrigger: {
                    trigger: el,
                    start: "top 90%",
                    toggleActions: "play none none reverse"
                },
                opacity: 1,
                y: 0,
                duration: 1,
                ease: "power3.out",
                delay: index * 0.05
            });
        });

        // 2. تأثير البارالاكس على صورة الهيدر
        gsap.to(".parallax-img", {
            yPercent: 20,
            ease: "none",
            scrollTrigger: {
                trigger: ".hero-header",
                scrub: true
            }
        });

        // 3. تأثير "تذبذب الورق" عند تحريك الماوس (اختياري لزيادة الفخامة)
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            gsap.to('.avatar', { x: x, y: y, duration: 2, ease: "power2.out" });
        });
    </script>
</body>
</html>
